name: lint
on: [push, pull_request]
jobs:
  run-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ '20.19', '22' ]
    name: Node ${{ matrix.node }} test
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npx grunt lint
