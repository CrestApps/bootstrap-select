name: lint
on:
  push:
    branches:
      - main
jobs:
  run-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ '20.19', '22' ]
    name: Node ${{ matrix.node }} test
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
