name: Sync docs for GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'js/**'
      - 'sass/**'
      - 'rollup.config.js'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages-sync
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    name: Build and sync docs site
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs site
        run: npm run docs:build

      - name: Sync built site into docs folder
        run: npm run docs:pages

      - name: Commit published docs
        run: |
          if git diff --quiet -- docs/; then
            echo "No published docs changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: publish static site"
          git push origin HEAD:main
