<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bootstrap-select live search example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../dist/css/bootstrap-select.min.css">
</head>
<body class="p-4">
  <main class="container">
    <h1>Live search</h1>
    <p class="text-body-secondary">Search the hosted example to verify the local plugin build.</p>
    <select class="selectpicker" data-live-search="true" data-width="fit" placeholder="Choose a menu item">
      <option data-tokens="ketchup mustard">Hot Dog, Fries and a Soda</option>
      <option data-tokens="mustard">Burger, Shake and a Smile</option>
      <option data-tokens="frosting">Sugar, Spice and all things nice</option>
    </select>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../dist/js/bootstrap-select.min.js"></script>
</body>
</html>
