<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bootstrap-select basic example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../dist/css/bootstrap-select.min.css">
</head>
<body class="p-4">
  <main class="container">
    <h1>Basic selectpicker</h1>
    <p class="text-body-secondary">This standalone page is served by the Docusaurus site and uses the local plugin build.</p>
    <select class="selectpicker" placeholder="Choose a condiment">
      <option>Mustard</option>
      <option>Ketchup</option>
      <option>Relish</option>
    </select>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../dist/js/bootstrap-select.min.js"></script>
</body>
</html>
