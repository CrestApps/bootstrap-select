<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bootstrap-select multiple example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../dist/css/bootstrap-select.min.css">
</head>
<body class="p-4">
  <main class="container">
    <h1>Multiple select</h1>
    <p class="text-body-secondary">Use Select All and Deselect All to test multiselect behavior.</p>
    <select class="selectpicker" multiple data-actions-box="true" data-selected-text-format="count > 2" placeholder="Choose condiments">
      <option>Mustard</option>
      <option>Ketchup</option>
      <option>Relish</option>
      <option>Onions</option>
      <option>Mayonnaise</option>
    </select>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../dist/js/bootstrap-select.min.js"></script>
</body>
</html>
